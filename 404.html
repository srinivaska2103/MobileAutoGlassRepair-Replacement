<!DOCTYPE html>
<html lang="en" x-data="authApp()" :class="darkMode ? 'dark' : ''" :dir="isRtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%230284c7' stroke-width='2.5'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' /%3E%3C/svg%3E">
    <title>404 - Page Not Found | GlassGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0284c7',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shatter': 'shatter 0.5s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .glass-crack {
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 overflow-hidden">

    <nav class="fixed top-0 w-full z-50 px-4 py-4 md:px-8 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="bg-primary p-2 rounded-lg text-white group-hover:rotate-12 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <span class="text-2xl font-black tracking-tighter dark:text-white">Glass<span class="text-primary">Go</span></span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleRtl()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 font-bold text-xs hover:scale-105 transition-all">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>
            <button @click="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:scale-105 transition-all">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </template>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-6 relative">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-primary/10 rounded-full blur-[120px] -z-10"></div>

        <div class="relative group cursor-default select-none animate-float">
            <h1 class="text-[120px] md:text-[200px] font-black text-gray-200 dark:text-gray-800 leading-none">404</h1>
            <div class="absolute inset-0 flex items-center justify-center">
                <p class="text-2xl md:text-4xl font-black text-primary uppercase tracking-[0.2em] drop-shadow-md">Oops! Shattered</p>
            </div>
        </div>

        <div class="text-center max-w-lg mt-8">
            <h2 class="text-3xl md:text-4xl font-black text-gray-900 dark:text-white mb-4">This page is cracked.</h2>
            <p class="text-gray-500 dark:text-gray-400 text-lg mb-10">
                It looks like the link you followed has been broken or moved. Don't worry, our technicians are better at fixing windshields than fixing URLs!
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-primary hover:bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-primary/30 transform hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Back to Home
                </a>
                <a href="#" class="w-full sm:w-auto px-10 py-4 bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white rounded-2xl font-black text-lg hover:border-primary transition-all flex items-center justify-center gap-2">
                    Report Issue
                </a>
            </div>
        </div>

        <div class="hidden lg:block absolute bottom-20 left-20 w-32 h-32 bg-primary/20 glass-crack rotate-12 blur-sm"></div>
        <div class="hidden lg:block absolute top-40 right-40 w-24 h-24 bg-blue-400/20 glass-crack -rotate-45 blur-sm"></div>
    </main>

    <footer class="p-8 text-center text-gray-400 text-sm font-medium">
        &copy; 2026 GlassGo Mobile Auto Glass. All rights reserved.
    </footer>

    <script>
        function authApp() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                isRtl: localStorage.getItem('isRtl') === 'true',
                
                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('darkMode', this.darkMode);
                },
                
                toggleRtl() {
                    this.isRtl = !this.isRtl;
                    localStorage.setItem('isRtl', this.isRtl);
                }
            }
        }
    </script>
</body>
</html>
