<!DOCTYPE html>
<html lang="en" x-data="authApp()" :class="darkMode ? 'dark' : ''" :dir="isRtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%230284c7' stroke-width='2.5'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' /%3E%3C/svg%3E">
    <title>Login | GlassGo Mobile Auto Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0284c7',
                        secondary: '#0ea5e9',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .glass-effect {
            backdrop-filter: blur(16px);
            background-color: rgba(255, 255, 255, 0.8);
        }
        .dark .glass-effect {
            background-color: rgba(15, 23, 42, 0.8);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="fixed top-0 w-full z-50 px-4 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="bg-primary p-2 rounded-lg text-white group-hover:rotate-12 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <span class="text-2xl font-black tracking-tighter dark:text-white">Glass<span class="text-primary">Go</span></span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleRtl()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 font-bold text-xs hover:bg-gray-50 transition-all">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>

            <button @click="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:bg-gray-50 transition-all">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </template>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 pt-20 pb-10 relative overflow-hidden">
        
        <div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary/20 rounded-full blur-[100px] animate-pulse-slow"></div>
        <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-blue-400/10 rounded-full blur-[100px] animate-pulse-slow"></div>

        <div class="w-full max-w-md relative z-10">
            <div class="glass-effect p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-white/20 dark:border-gray-800">
                
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-gray-900 dark:text-white mb-2">Welcome Back</h1>
                    <p class="text-gray-500 dark:text-gray-400 font-medium">Log in to manage your repairs</p>
                </div>

                <form @submit.prevent class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Email Address</label>
                        <input type="email" placeholder="name@company.com" 
                               class="w-full px-5 py-4 bg-white/50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Password</label>
                        <input type="password" placeholder="••••••••" 
                               class="w-full px-5 py-4 bg-white/50 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:text-white">
                        
                        <div class="flex items-center justify-between mt-2 px-1">
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary">
                                <span class="text-xs font-bold text-gray-500 group-hover:text-primary transition-colors">Remember me</span>
                            </label>
                            <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot Password?</a>
                        </div>
                    </div>

                    <button class="w-full py-4 bg-primary hover:bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-primary/30 transform hover:-translate-y-0.5 active:scale-95 transition-all">
                        Log In
                    </button>
                </form>

                <div class="relative my-10">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-gray-700"></div></div>
                    <div class="relative flex justify-center text-xs uppercase font-black tracking-widest"><span class="bg-slate-50 dark:bg-gray-900 px-4 text-gray-400">Or continue with</span></div>
                </div>

                <div class="flex justify-center gap-4">
                    <button class="p-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.224 1.224-3.136 2.52-6.504 2.52-5.416 0-9.56-4.384-9.56-9.8s4.144-9.8 9.56-9.8c2.936 0 5.144 1.152 6.704 2.616l2.312-2.312C18.416 1.496 15.696 0 12.184 0 5.512 0 0 5.512 0 12.184s5.512 12.184 12.184 12.184c3.672 0 6.44-1.208 8.64-3.512 2.304-2.304 3.016-5.544 3.016-8.216 0-.816-.072-1.584-.192-2.32h-11.36z"/>
                        </svg>
                    </button>
                    <button class="p-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
                        <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </button>
                    <button class="p-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.6.113.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </button>
                </div>

                <p class="text-center mt-8 text-sm font-bold text-gray-500">
                    Don't have an account? 
                    <a href="regeister.html" class="text-primary hover:underline">Sign up now</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        function authApp() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                isRtl: localStorage.getItem('isRtl') === 'true',
                
                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('darkMode', this.darkMode);
                },
                
                toggleRtl() {
                    this.isRtl = !this.isRtl;
                    localStorage.setItem('isRtl', this.isRtl);
                }
            }
        }
    </script>
</body>
</html>
