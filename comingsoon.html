<!DOCTYPE html>
<html lang="en" x-data="authApp()" :class="darkMode ? 'dark' : ''" :dir="isRtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%230284c7' stroke-width='2.5'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' /%3E%3C/svg%3E">
    <title>Coming Soon | GlassGo Mobile Auto Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0284c7',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 5s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .glass-effect {
            backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.7);
        }
        .dark .glass-effect {
            background-color: rgba(15, 23, 42, 0.7);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 px-4 py-4 md:px-8 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 group">
            <div class="bg-primary p-2 rounded-lg text-white group-hover:rotate-12 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <span class="text-2xl font-black tracking-tighter dark:text-white">Glass<span class="text-primary">Go</span></span>
        </a>

        <div class="flex items-center gap-2">
            <button @click="toggleRtl()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 font-bold text-xs hover:scale-105 transition-all">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>
            <button @click="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 hover:scale-105 transition-all">
                <template x-if="!darkMode">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </template>
                <template x-if="darkMode">
                    <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </template>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 pt-24 pb-12 relative">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[600px] md:h-[600px] bg-primary/20 rounded-full blur-[120px] -z-10 animate-pulse-slow"></div>

        <div class="text-center max-w-4xl w-full">
            <div class="inline-flex p-4 rounded-[2rem] bg-white dark:bg-gray-800 shadow-2xl mb-8 animate-float">
                <svg class="w-12 h-12 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>

            <h1 class="text-4xl md:text-7xl font-black text-gray-900 dark:text-white mb-6 leading-tight">
                Clearer Views <br> <span class="text-primary italic">Coming Soon</span>
            </h1>
            
            <p class="text-lg md:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto mb-12 font-medium">
                We're putting the finishing touches on our new mobile booking platform. Get ready for the fastest auto glass service in the city.
            </p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8 max-w-3xl mx-auto mb-16" x-data="countdown()">
                <template x-for="(val, label) in timeLeft" :key="label">
                    <div class="glass-effect p-6 rounded-[2rem] border border-white/20 dark:border-gray-800 shadow-xl">
                        <div class="text-3xl md:text-5xl font-black text-primary" x-text="val">00</div>
                        <div class="text-xs md:text-sm font-bold uppercase tracking-widest text-gray-400 mt-2" x-text="label">Days</div>
                    </div>
                </template>
            </div>

            <div class="max-w-md mx-auto">
                <div class="glass-effect p-2 rounded-3xl shadow-2xl border border-white/20 dark:border-gray-800 flex flex-col sm:flex-row gap-2">
                    <input type="email" placeholder="Enter your email" 
                           class="flex-grow bg-transparent border-none px-6 py-4 focus:ring-0 font-bold text-gray-900 dark:text-white placeholder-gray-400 outline-none">
                    <button class="bg-primary hover:bg-blue-600 text-white px-8 py-4 rounded-2xl font-black transition-all shadow-lg shadow-primary/30 active:scale-95 whitespace-nowrap">
                        Notify Me
                    </button>
                </div>
                <p class="mt-4 text-xs font-bold text-gray-400 uppercase tracking-tighter italic">
                    * No spam, just a one-time launch notification.
                </p>
            </div>
        </div>
    </main>

    <footer class="p-8 flex flex-col items-center gap-6">
        <div class="flex gap-6 opacity-60 hover:opacity-100 transition-opacity">
            <a href="#" class="hover:text-primary transition-colors">Twitter</a>
            <a href="#" class="hover:text-primary transition-colors">Instagram</a>
            <a href="#" class="hover:text-primary transition-colors">Facebook</a>
        </div>
        <p class="text-gray-400 text-xs font-bold">&copy; 2026 GlassGo Mobile Auto Glass.</p>
    </footer>

    <script>
        function authApp() {
            return {
                darkMode: localStorage.getItem('darkMode') === 'true',
                isRtl: localStorage.getItem('isRtl') === 'true',
                toggleDark() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('darkMode', this.darkMode);
                },
                toggleRtl() {
                    this.isRtl = !this.isRtl;
                    localStorage.setItem('isRtl', this.isRtl);
                }
            }
        }

        function countdown() {
            return {
                timeLeft: { days: '00', hours: '00', minutes: '00', seconds: '00' },
                expiry: new Date().getTime() + (14 * 24 * 60 * 60 * 1000), // 14 days from now
                init() {
                    setInterval(() => {
                        let now = new Date().getTime();
                        let d = this.expiry - now;
                        this.timeLeft.days = Math.floor(d / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                        this.timeLeft.hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                        this.timeLeft.minutes = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                        this.timeLeft.seconds = Math.floor((d % (1000 * 60)) / 1000).toString().padStart(2, '0');
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
